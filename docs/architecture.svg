<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#F9FAFB" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Org RAG Knowledge Base — System Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#6B7280">組織知識庫 AI 問答系統架構圖</text>

  <!-- ═══ ZONE 1: Data Ingestion ═══ -->
  <rect x="20" y="80" width="260" height="220" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="150" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">① 知識庫更新 / Data Ingestion</text>

  <!-- Google Drive box -->
  <rect x="40" y="110" width="220" height="44" rx="8" fill="#fff" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="150" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">📁 Google Drive</text>
  <text x="150" y="143" text-anchor="middle" font-size="10" fill="#6B7280">監聽資料夾 · 每分鐘輪詢</text>

  <!-- Arrow down -->
  <line x1="150" y1="154" x2="150" y2="172" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diff box -->
  <rect x="40" y="172" width="220" height="44" rx="8" fill="#fff" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="150" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">🔄 差異比對 / Diff Engine</text>
  <text x="150" y="205" text-anchor="middle" font-size="10" fill="#6B7280">新增檔案偵測 · 刪除檔案偵測</text>

  <!-- Two arrows -->
  <line x1="110" y1="216" x2="80" y2="240" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="190" y1="216" x2="220" y2="240" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Add path -->
  <rect x="40" y="240" width="80" height="36" rx="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="80" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">➕ 新增</text>
  <text x="80" y="269" text-anchor="middle" font-size="9" fill="#166534">PDF 解析 + 寫入</text>

  <!-- Delete path -->
  <rect x="160" y="240" width="80" height="36" rx="7" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="200" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">➖ 刪除</text>
  <text x="200" y="269" text-anchor="middle" font-size="9" fill="#991B1B">向量資料移除</text>

  <!-- ═══ ZONE 2: Vector DBs ═══ -->
  <rect x="310" y="80" width="260" height="220" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">② 向量資料庫 / Vector Stores</text>

  <!-- Processing pipeline -->
  <rect x="330" y="110" width="220" height="44" rx="8" fill="#fff" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="440" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">⚙️ 文件處理 / Processing</text>
  <text x="440" y="143" text-anchor="middle" font-size="10" fill="#6B7280">PDF 解析 → Chunking → Embedding</text>

  <line x1="440" y1="154" x2="440" y2="172" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cohere -->
  <rect x="330" y="172" width="220" height="30" rx="7" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.2"/>
  <text x="440" y="191" text-anchor="middle" font-size="10" font-weight="600" fill="#854D0E">🔤 Cohere embed-multilingual-v2.0</text>

  <line x1="390" y1="202" x2="370" y2="220" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="202" x2="510" y2="220" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pinecone -->
  <rect x="330" y="220" width="95" height="52" rx="7" fill="#fff" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="377" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">🌲 Pinecone</text>
  <text x="377" y="254" text-anchor="middle" font-size="9" fill="#6B7280">Cloud</text>
  <text x="377" y="266" text-anchor="middle" font-size="9" fill="#6B7280">Vector DB</text>

  <!-- PGVector -->
  <rect x="435" y="220" width="95" height="52" rx="7" fill="#fff" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="482" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">🐘 PGVector</text>
  <text x="482" y="254" text-anchor="middle" font-size="9" fill="#6B7280">Postgres</text>
  <text x="482" y="266" text-anchor="middle" font-size="9" fill="#6B7280">Self-hosted</text>

  <!-- ═══ ZONE 3: Chat Interface ═══ -->
  <rect x="600" y="80" width="280" height="220" rx="10" fill="#FDF4FF" stroke="#E9D5FF" stroke-width="1.5"/>
  <text x="740" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#7E22CE">③ AI 問答介面 / Chat Interface</text>

  <!-- User -->
  <rect x="620" y="110" width="240" height="36" rx="8" fill="#fff" stroke="#D8B4FE" stroke-width="1.2"/>
  <text x="740" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#6B21A8">💬 使用者提問 / User Query</text>

  <line x1="740" y1="146" x2="740" y2="162" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI Agent -->
  <rect x="620" y="162" width="240" height="44" rx="8" fill="#fff" stroke="#D8B4FE" stroke-width="1.2"/>
  <text x="740" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#6B21A8">🤖 AI Agent</text>
  <text x="740" y="195" text-anchor="middle" font-size="10" fill="#6B7280">Gemini 3 Flash + Memory</text>

  <line x1="740" y1="206" x2="740" y2="222" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reranker -->
  <rect x="620" y="222" width="240" height="36" rx="8" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.2"/>
  <text x="740" y="240" text-anchor="middle" font-size="10" font-weight="600" fill="#854D0E">🎯 Cohere Reranker (top-10 → top-5)</text>
  <text x="740" y="253" text-anchor="middle" font-size="9" fill="#854D0E">rerank-multilingual-v3.0</text>

  <line x1="740" y1="258" x2="740" y2="274" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Answer -->
  <rect x="620" y="274" width="240" height="26" rx="7" fill="#F3E8FF" stroke="#D8B4FE" stroke-width="1.2"/>
  <text x="740" y="291" text-anchor="middle" font-size="10" font-weight="600" fill="#6B21A8">✅ 回答 / Answer</text>

  <!-- ═══ ZONE 4: Audit Log ═══ -->
  <rect x="310" y="330" width="260" height="70" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="440" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">④ 稽核紀錄 / Audit Log</text>
  <rect x="330" y="358" width="220" height="30" rx="7" fill="#fff" stroke="#FDE68A" stroke-width="1.2"/>
  <text x="440" y="371" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">📊 Google Sheets — AI_Knowledge_Base_Log</text>
  <text x="440" y="383" text-anchor="middle" font-size="9" fill="#6B7280">FileName · UploadTime · Status</text>

  <!-- Cross-zone arrows -->
  <!-- Ingestion → Vector DBs -->
  <line x1="280" y1="190" x2="308" y2="190" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Vector DBs → Chat (query path) -->
  <line x1="570" y1="240" x2="598" y2="240" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Ingestion → Audit Log -->
  <line x1="150" y1="300" x2="150" y2="410" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="150" y1="410" x2="308" y2="375" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Vector DBs → Audit Log -->
  <line x1="440" y1="300" x2="440" y2="328" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ═══ Tech Stack Legend ═══ -->
  <rect x="20" y="420" width="860" height="140" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.2"/>
  <text x="450" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Tech Stack</text>

  <!-- Row 1 -->
  <rect x="40" y="452" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="100" y="470" text-anchor="middle" font-size="10" fill="#374151">🔧 Orchestration</text>
  <text x="175" y="470" font-size="10" fill="#6B7280">n8n (self-hosted)</text>

  <rect x="310" y="452" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="370" y="470" text-anchor="middle" font-size="10" fill="#374151">🤖 LLM</text>
  <text x="445" y="470" font-size="10" fill="#6B7280">Google Gemini 3 Flash</text>

  <rect x="600" y="452" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="660" y="470" text-anchor="middle" font-size="10" fill="#374151">🔤 Embedding</text>
  <text x="735" y="470" font-size="10" fill="#6B7280">Cohere multilingual-v2</text>

  <!-- Row 2 -->
  <rect x="40" y="490" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="100" y="508" text-anchor="middle" font-size="10" fill="#374151">🌲 Vector DB 1</text>
  <text x="175" y="508" font-size="10" fill="#6B7280">Pinecone (cloud)</text>

  <rect x="310" y="490" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="370" y="508" text-anchor="middle" font-size="10" fill="#374151">🐘 Vector DB 2</text>
  <text x="445" y="508" font-size="10" fill="#6B7280">Postgres PGVector</text>

  <rect x="600" y="490" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="660" y="508" text-anchor="middle" font-size="10" fill="#374151">🎯 Reranker</text>
  <text x="735" y="508" font-size="10" fill="#6B7280">Cohere rerank-v3</text>

  <!-- Row 3 -->
  <rect x="40" y="528" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="100" y="546" text-anchor="middle" font-size="10" fill="#374151">📁 Storage</text>
  <text x="175" y="546" font-size="10" fill="#6B7280">Google Drive + Sheets</text>

  <rect x="310" y="528" width="120" height="28" rx="6" fill="#fff" stroke="#E5E7EB"/>
  <text x="370" y="546" text-anchor="middle" font-size="10" fill="#374151">💬 Chat UI</text>
  <text x="445" y="546" font-size="10" fill="#6B7280">n8n Chat Widget</text>
</svg>
